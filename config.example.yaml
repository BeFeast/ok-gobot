# Example configuration for ok-gobot

# Telegram bot configuration
telegram:
  token: "YOUR_BOT_TOKEN_HERE"
  webhook: ""

# AI provider configuration
ai:
  provider: "openrouter"  # openrouter, openai, anthropic, droid, or custom
  api_key: "YOUR_API_KEY_HERE"
  model: "moonshotai/kimi-k2.5"
  base_url: ""  # For custom providers
  fallback_models: []
  default_thinking: ""  # Optional: off, low, medium, high, adaptive (provider/model dependent)
  # Droid provider settings (factory.ai droid exec subprocess)
  # Only used when provider: "droid"
  # droid:
  #   binary_path: "droid"   # Path to droid binary
  #   auto_level: "low"      # Autonomy: low, medium, high
  #   work_dir: ""           # Working directory for droid

# Authentication configuration
auth:
  mode: "open"  # open, allowlist, or pairing
  allowed_users: []
  admin_id: 0

# HTTP API configuration
api:
  enabled: false  # Set to true to enable HTTP API
  port: 8080      # API server port
  api_key: ""     # Required if enabled - set a secure API key
  webhook_chat: 0 # Default chat ID for webhook messages (optional)

# (control: section is defined below with full documentation)

# Group chat configuration
groups:
  default_mode: "standby"  # active or standby

# Text-to-Speech configuration
tts:
  provider: "edge"  # openai or edge
  default_voice: "ru-RU-DmitryNeural"  # Provider-specific default voice
  # OpenAI voices: alloy, echo, fable, onyx, nova, shimmer
  # Edge voices: ru-RU-DmitryNeural, ru-RU-SvetlanaNeural, en-US-GuyNeural, en-US-JennyNeural, en-US-AriaNeural

# Memory configuration (optional)
memory:
  enabled: false
  embeddings_base_url: "https://api.openai.com/v1"
  embeddings_api_key: ""  # Can reuse ai.api_key
  embeddings_model: "text-embedding-3-small"
  metadata_extraction: false
  metadata_model: "haiku"  # Lightweight model alias/name for metadata extraction
  mcp:
    enabled: false       # Optional MCP server for cross-tool memory access
    host: "127.0.0.1"    # Local-only by default
    port: 9233
    endpoint: "/mcp"
    allow_writes: false  # Required for memory_capture writes

# Multi-Agent Configuration (optional)
# Configure multiple agents with different personalities, models, and tool restrictions
# If empty/missing, the bot uses a single default agent with personality from soul_path
agents: []
# Example multi-agent configuration:
# agents:
#   - name: "default"
#     soul_path: "~/ok-gobot-soul"
#     model: ""  # empty = use global ai.model
#     allowed_tools: []  # empty = all tools allowed
#
#   - name: "coder"
#     soul_path: "~/ok-gobot-soul-coder"
#     model: "anthropic/claude-3.5-sonnet"
#     allowed_tools:
#       - "local"
#       - "file"
#       - "grep"
#       - "patch"
#       - "web_fetch"
#
#   - name: "researcher"
#     soul_path: "~/ok-gobot-soul-researcher"
#     model: "openai/gpt-4-turbo"
#     allowed_tools:
#       - "brave_search"
#       - "exa_search"
#       - "web_fetch"
#       - "readability"
#
# Available commands with multi-agent mode:
#   /agent - Show current agent
#   /agent list - List all available agents
#   /agent <name> - Switch to specified agent

# WebSocket control server (disabled by default, loopback only when enabled)
# Provides real-time session/run/tool/approval events and remote control commands
# for the TUI and other local consumers.
# SECURITY: Enable only when you need TUI/web UI access. Always set a token
#           when exposing the control server.
control:
  enabled: false         # Set to true to enable (disabled by default for security)
  port: 8787             # Bind port (default 8787, always on 127.0.0.1)
  token: ""              # Optional auth token; empty = no token required on loopback
  allow_loopback_without_token: true  # Skip token check for 127.0.0.1 connections
# Connect: ws://127.0.0.1:8787/ws
#   Auth:  Authorization: Bearer <token>  (or ?token=<token>)

# Runtime configuration
# runtime.mode from older configs is ignored; the chat/jobs contract is fixed.
runtime:
  session_queue_limit: 100  # Per-session queue capacity for the chat/jobs mailbox runtime

# Session key routing configuration
session:
  dm_scope: "main"  # main or per_user

# Optional model alias overrides (empty = built-in defaults)
model_aliases: {}

# Storage and logging
storage_path: "~/.ok-gobot/ok-gobot.db"
soul_path: "~/ok-gobot-soul"  # Default personality directory (deprecated, use agents)
log_level: "info"
