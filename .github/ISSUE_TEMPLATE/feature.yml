name: Feature
description: Propose a new feature framed as a user outcome
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Every feature issue must be phrased as a user outcome, not an infrastructure task.

        **Good:** "When a tool call takes >20s, auto-spawn it as a subagent and notify the user"
        **Bad:** "Implement sub-agent spawn API"

  - type: textarea
    id: user-story
    attributes:
      label: User Story
      description: "As a [role], I want [behavior] so that [benefit]."
      placeholder: "As an operator, I want ... so that ..."
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: Observable behaviors that prove the feature works.
      placeholder: |
        - [ ] Observable behavior 1
        - [ ] Observable behavior 2
    validations:
      required: true

  - type: textarea
    id: default-behavior
    attributes:
      label: Default Behavior
      description: What happens out of the box, and why this default is correct.
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Links, screenshots, related issues, or technical notes.
    validations:
      required: false
