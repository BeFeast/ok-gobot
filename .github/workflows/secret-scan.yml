name: Secret Scan

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install gitleaks
        run: go install github.com/zricethezav/gitleaks/v8@v8.30.1

      - name: Scan working tree for secrets
        run: |
          "$(go env GOPATH)/bin/gitleaks" detect \
            --config .gitleaks.toml \
            --source . \
            --no-git \
            --redact
