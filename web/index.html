<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ok-gobot dashboard</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0d1117; --bg2: #161b22; --bg3: #21262d;
  --fg: #c9d1d9; --fg2: #8b949e; --fg3: #484f58;
  --accent: #58a6ff; --green: #3fb950; --red: #f85149;
  --orange: #d29922; --border: #30363d;
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; background: var(--bg); color: var(--fg); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

/* Top bar */
#topbar { padding: 10px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: var(--bg2); flex-shrink: 0; }
#topbar h1 { font-size: 16px; font-weight: 600; }
#status { display: flex; align-items: center; gap: 8px; font-size: 13px; }
#status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--fg3); }
#status-dot.connected { background: var(--green); }
#status-text { color: var(--fg2); }

/* Tabs */
#tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); background: var(--bg2); flex-shrink: 0; padding: 0 16px; }
.tab { padding: 10px 20px; font-size: 14px; color: var(--fg2); cursor: pointer; border-bottom: 2px solid transparent; font-weight: 500; }
.tab:hover { color: var(--fg); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* Main content */
#content { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
.tab-pane { display: none; flex: 1; overflow: auto; }
.tab-pane.active { display: flex; flex-direction: column; }

/* Stats bar */
#stats-bar { display: flex; gap: 16px; padding: 12px 20px; border-bottom: 1px solid var(--border); background: var(--bg2); flex-shrink: 0; flex-wrap: wrap; }
.stat { display: flex; align-items: center; gap: 6px; font-size: 13px; }
.stat-value { font-weight: 700; font-size: 18px; }
.stat-label { color: var(--fg2); }

/* Job table */
#job-list { flex: 1; overflow: auto; padding: 0; }
table { width: 100%; border-collapse: collapse; }
th { position: sticky; top: 0; background: var(--bg2); text-align: left; padding: 10px 16px; font-size: 12px; color: var(--fg2); text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); }
td { padding: 10px 16px; font-size: 13px; border-bottom: 1px solid var(--border); vertical-align: top; }
tr:hover td { background: var(--bg2); }
tr.clickable { cursor: pointer; }

/* Status badges */
.badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; text-transform: uppercase; }
.badge.pending { background: rgba(139,148,158,0.15); color: var(--fg2); }
.badge.running { background: rgba(210,153,34,0.15); color: var(--orange); }
.badge.succeeded { background: rgba(63,185,80,0.15); color: var(--green); }
.badge.failed { background: rgba(248,81,73,0.15); color: var(--red); }
.badge.cancelled { background: rgba(139,148,158,0.15); color: var(--fg3); }
.badge.timed_out { background: rgba(248,81,73,0.15); color: var(--red); }

/* Job detail panel */
#detail-panel { display: none; position: fixed; top: 0; right: 0; width: 520px; height: 100vh; background: var(--bg2); border-left: 1px solid var(--border); z-index: 200; flex-direction: column; box-shadow: -4px 0 16px rgba(0,0,0,0.3); }
#detail-panel.open { display: flex; }
#detail-header { padding: 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
#detail-header h3 { font-size: 14px; font-weight: 600; }
#detail-close { background: none; border: none; color: var(--fg2); font-size: 20px; cursor: pointer; padding: 4px 8px; border-radius: 4px; }
#detail-close:hover { background: var(--bg3); color: var(--fg); }
#detail-body { flex: 1; overflow: auto; padding: 16px; }

/* Detail sections */
.detail-section { margin-bottom: 20px; }
.detail-section h4 { font-size: 12px; color: var(--fg2); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
.detail-grid { display: grid; grid-template-columns: 120px 1fr; gap: 6px 12px; font-size: 13px; }
.detail-grid .label { color: var(--fg2); }
.detail-grid .value { word-break: break-all; }

/* Event timeline */
.timeline { list-style: none; }
.timeline li { position: relative; padding: 8px 0 8px 20px; font-size: 12px; border-left: 2px solid var(--border); }
.timeline li::before { content: ''; position: absolute; left: -5px; top: 12px; width: 8px; height: 8px; border-radius: 50%; background: var(--fg3); }
.timeline li.created::before { background: var(--accent); }
.timeline li.started::before { background: var(--orange); }
.timeline li.succeeded::before { background: var(--green); }
.timeline li.failed::before, .timeline li.timed_out::before { background: var(--red); }
.timeline li.cancelled::before { background: var(--fg3); }
.timeline li.progress::before { background: var(--accent); }
.timeline li.artifact_added::before { background: #a371f7; }
.timeline .ev-type { font-weight: 600; color: var(--fg); margin-right: 6px; }
.timeline .ev-time { color: var(--fg3); font-size: 11px; }
.timeline .ev-msg { color: var(--fg2); margin-top: 2px; }

/* Artifact cards */
.artifact-card { background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; margin-bottom: 8px; font-size: 13px; }
.artifact-card .art-name { font-weight: 600; color: var(--accent); }
.artifact-card .art-type { font-size: 11px; color: var(--fg2); margin-left: 8px; }
.artifact-card .art-content { margin-top: 6px; background: var(--bg); border-radius: 4px; padding: 8px; font-family: monospace; font-size: 12px; max-height: 200px; overflow: auto; white-space: pre-wrap; word-break: break-all; }
.artifact-card .art-uri { margin-top: 4px; }
.artifact-card .art-uri a { color: var(--accent); text-decoration: none; font-size: 12px; }

/* Workers panel */
.worker-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; padding: 14px 16px; margin-bottom: 8px; }
.worker-card .worker-name { font-weight: 600; font-size: 14px; }
.worker-card .worker-stats { display: flex; gap: 16px; margin-top: 6px; font-size: 12px; color: var(--fg2); }

/* Queue panel */
#queue-content { padding: 20px; flex: 1; overflow: auto; }
.queue-section { margin-bottom: 24px; }
.queue-section h3 { font-size: 14px; margin-bottom: 12px; }

/* Refresh button */
.refresh-btn { background: var(--bg3); border: 1px solid var(--border); color: var(--fg); padding: 4px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; }
.refresh-btn:hover { border-color: var(--accent); color: var(--accent); }

/* Empty state */
.empty { text-align: center; padding: 60px 20px; color: var(--fg2); }
.empty .icon { font-size: 48px; margin-bottom: 16px; opacity: 0.3; }
.empty p { font-size: 14px; }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--fg3); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--fg2); }

/* Mono text */
.mono { font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace; }
.truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 200px; display: inline-block; vertical-align: bottom; }
</style>
</head>
<body>

<div id="topbar">
  <h1>ok-gobot</h1>
  <div id="status">
    <div id="status-dot"></div>
    <span id="status-text">disconnected</span>
    <button class="refresh-btn" onclick="refreshData()">Refresh</button>
  </div>
</div>

<div id="tabs">
  <div class="tab active" data-tab="jobs" onclick="switchTab('jobs')">Jobs</div>
  <div class="tab" data-tab="workers" onclick="switchTab('workers')">Workers</div>
  <div class="tab" data-tab="artifacts" onclick="switchTab('artifacts')">Artifacts</div>
  <div class="tab" data-tab="queue" onclick="switchTab('queue')">Queue</div>
</div>

<div id="content">
  <!-- Jobs tab -->
  <div class="tab-pane active" id="pane-jobs">
    <div id="stats-bar">
      <div class="stat"><span class="stat-value" id="stat-total">0</span><span class="stat-label">total</span></div>
      <div class="stat"><span class="stat-value" id="stat-running" style="color:var(--orange)">0</span><span class="stat-label">running</span></div>
      <div class="stat"><span class="stat-value" id="stat-pending" style="color:var(--fg2)">0</span><span class="stat-label">pending</span></div>
      <div class="stat"><span class="stat-value" id="stat-succeeded" style="color:var(--green)">0</span><span class="stat-label">succeeded</span></div>
      <div class="stat"><span class="stat-value" id="stat-failed" style="color:var(--red)">0</span><span class="stat-label">failed</span></div>
    </div>
    <div id="job-list">
      <table>
        <thead>
          <tr>
            <th>Status</th>
            <th>Job ID</th>
            <th>Kind</th>
            <th>Worker</th>
            <th>Description</th>
            <th>Created</th>
            <th>Duration</th>
          </tr>
        </thead>
        <tbody id="job-tbody"></tbody>
      </table>
    </div>
  </div>

  <!-- Workers tab -->
  <div class="tab-pane" id="pane-workers">
    <div id="workers-content" style="padding:20px; flex:1; overflow:auto;"></div>
  </div>

  <!-- Artifacts tab -->
  <div class="tab-pane" id="pane-artifacts">
    <div id="artifacts-content" style="padding:20px; flex:1; overflow:auto;"></div>
  </div>

  <!-- Queue tab -->
  <div class="tab-pane" id="pane-queue">
    <div id="queue-content"></div>
  </div>
</div>

<!-- Job detail slide-over panel -->
<div id="detail-panel">
  <div id="detail-header">
    <h3 id="detail-title">Job Detail</h3>
    <button id="detail-close" onclick="closeDetail()">&times;</button>
  </div>
  <div id="detail-body"></div>
</div>

<script>
// State
let ws = null;
let reconnectDelay = 1000;
let jobs = [];
let allArtifacts = {}; // jobID -> artifacts[]
let currentTab = 'jobs';

// ── WebSocket ────────────────────────────────────────────────────────

function connect() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  const host = location.hostname || '127.0.0.1';
  const port = window.CONTROL_PORT || location.port || '8787';
  ws = new WebSocket(`${proto}://${host}:${port}/ws`);

  ws.onopen = () => {
    setStatus('connected');
    reconnectDelay = 1000;
    send({ type: 'list_sessions' }); // handshake
  };

  ws.onclose = () => {
    setStatus('disconnected');
    setTimeout(connect, reconnectDelay);
    reconnectDelay = Math.min(reconnectDelay * 2, 30000);
  };

  ws.onerror = () => {};
  ws.onmessage = (e) => handleMessage(JSON.parse(e.data));
}

function send(obj) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify(obj));
  }
}

function handleMessage(msg) {
  switch (msg.type) {
    case 'connected':
      send({ type: 'list_jobs' });
      break;
    case 'jobs':
      jobs = msg.jobs || [];
      renderJobs();
      renderWorkers();
      renderAllArtifacts();
      renderQueue();
      break;
    case 'job_detail':
      renderJobDetail(msg.job, msg.events || [], msg.artifacts || []);
      break;
    case 'job_artifacts':
      // Scaffolding: backend wires CmdGetArtifacts / handleGetArtifacts,
      // but the frontend currently fetches artifacts via get_job_detail.
      // This handler will be used when per-job artifact polling is added.
      break;
    case 'error':
      console.error('[ws]', msg.message);
      break;
    case 'event':
      // A job event occurred - refresh jobs list
      if (msg.kind === 'run_start' || msg.kind === 'run_end' ||
          msg.kind === 'child_done' || msg.kind === 'child_failed') {
        send({ type: 'list_jobs' });
      }
      break;
  }
}

function setStatus(s) {
  const dot = document.getElementById('status-dot');
  const text = document.getElementById('status-text');
  dot.className = s === 'connected' ? 'connected' : '';
  text.textContent = s;
}

function refreshData() {
  send({ type: 'list_jobs' });
}

// ── Tabs ─────────────────────────────────────────────────────────────

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.toggle('active', p.id === 'pane-' + tab));
}

// ── Jobs rendering ───────────────────────────────────────────────────

function renderJobs() {
  // Stats
  const counts = { total: jobs.length, running: 0, pending: 0, succeeded: 0, failed: 0 };
  jobs.forEach(j => {
    if (j.status === 'running') counts.running++;
    else if (j.status === 'pending') counts.pending++;
    else if (j.status === 'succeeded') counts.succeeded++;
    else if (j.status === 'failed' || j.status === 'timed_out') counts.failed++;
  });
  document.getElementById('stat-total').textContent = counts.total;
  document.getElementById('stat-running').textContent = counts.running;
  document.getElementById('stat-pending').textContent = counts.pending;
  document.getElementById('stat-succeeded').textContent = counts.succeeded;
  document.getElementById('stat-failed').textContent = counts.failed;

  // Table
  const tbody = document.getElementById('job-tbody');
  if (jobs.length === 0) {
    tbody.innerHTML = '<tr><td colspan="7"><div class="empty"><div class="icon">&#9744;</div><p>No jobs yet</p></div></td></tr>';
    return;
  }

  tbody.innerHTML = jobs.map(j => {
    const shortID = escHtml(j.job_id.length > 20 ? j.job_id.slice(0, 20) + '...' : j.job_id);
    const desc = escHtml(j.description || '-');
    const created = formatTime(j.created_at);
    const duration = computeDuration(j);
    return `<tr class="clickable" onclick="openDetail('${escAttr(j.job_id)}')">
      <td><span class="badge ${escAttr(j.status)}">${escHtml(j.status)}</span></td>
      <td class="mono">${shortID}</td>
      <td>${escHtml(j.kind || '-')}</td>
      <td>${escHtml(j.worker || '-')}</td>
      <td><span class="truncate" title="${escAttr(j.description)}">${desc}</span></td>
      <td>${created}</td>
      <td>${duration}</td>
    </tr>`;
  }).join('');
}

// Normalize SQLite DATETIME strings ("YYYY-MM-DD HH:MM:SS") to ISO 8601
// so that all browsers (including Safari) parse them correctly.
function parseTS(ts) {
  if (!ts) return null;
  const d = new Date(ts.replace(' ', 'T') + (ts.includes('T') || ts.includes('Z') ? '' : 'Z'));
  return isNaN(d) ? null : d;
}

function computeDuration(job) {
  if (!job.started_at) return '-';
  const start = parseTS(job.started_at);
  if (!start) return '-';
  const end = job.completed_at ? parseTS(job.completed_at) : new Date();
  const ms = end - start;
  if (ms < 1000) return ms + 'ms';
  if (ms < 60000) return (ms / 1000).toFixed(1) + 's';
  return (ms / 60000).toFixed(1) + 'm';
}

function formatTime(ts) {
  if (!ts) return '-';
  try {
    const d = parseTS(ts);
    if (!d) return ts;
    const now = new Date();
    const diff = now - d;
    if (diff < 60000) return 'just now';
    if (diff < 3600000) return Math.floor(diff / 60000) + 'm ago';
    if (diff < 86400000) return Math.floor(diff / 3600000) + 'h ago';
    return d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  } catch { return ts; }
}

// ── Job Detail ───────────────────────────────────────────────────────

function openDetail(jobID) {
  send({ type: 'get_job_detail', job_id: jobID });
  document.getElementById('detail-panel').classList.add('open');
}

function closeDetail() {
  document.getElementById('detail-panel').classList.remove('open');
}

function renderJobDetail(job, events, artifacts) {
  if (!job) return;
  document.getElementById('detail-title').textContent = 'Job: ' + (job.job_id.length > 24 ? job.job_id.slice(0, 24) + '...' : job.job_id);

  // Cache artifacts for the all-artifacts view
  if (artifacts.length > 0) {
    allArtifacts[job.job_id] = artifacts;
    renderAllArtifacts();
  }

  let html = '';

  // Info section
  html += '<div class="detail-section"><h4>Info</h4><div class="detail-grid">';
  html += gridRow('Job ID', `<span class="mono">${escHtml(job.job_id)}</span>`);
  html += gridRow('Status', `<span class="badge ${escAttr(job.status)}">${escHtml(job.status)}</span>`);
  html += gridRow('Kind', escHtml(job.kind || '-'));
  html += gridRow('Worker', escHtml(job.worker || '-'));
  html += gridRow('Description', escHtml(job.description || '-'));
  html += gridRow('Session', `<span class="mono">${escHtml(job.session_key || '-')}</span>`);
  html += gridRow('Attempt', `${job.attempt} / ${job.max_attempts}`);
  if (job.retry_of_job_id) html += gridRow('Retry of', `<span class="mono">${escHtml(job.retry_of_job_id)}</span>`);
  html += gridRow('Created', escHtml(job.created_at || '-'));
  if (job.started_at) html += gridRow('Started', escHtml(job.started_at));
  if (job.completed_at) html += gridRow('Completed', escHtml(job.completed_at));
  if (job.summary) html += gridRow('Summary', escHtml(job.summary));
  if (job.error) html += gridRow('Error', `<span style="color:var(--red)">${escHtml(job.error)}</span>`);
  html += '</div></div>';

  // Artifacts section
  if (artifacts.length > 0) {
    html += '<div class="detail-section"><h4>Artifacts (' + artifacts.length + ')</h4>';
    artifacts.forEach(a => {
      html += renderArtifactCard(a);
    });
    html += '</div>';
  }

  // Events timeline
  if (events.length > 0) {
    html += '<div class="detail-section"><h4>Events (' + events.length + ')</h4><ul class="timeline">';
    events.forEach(ev => {
      html += `<li class="${escAttr(ev.event_type)}">
        <span class="ev-type">${escHtml(ev.event_type)}</span>
        <span class="ev-time">${formatTime(ev.created_at)}</span>
        ${ev.message ? '<div class="ev-msg">' + escHtml(ev.message) + '</div>' : ''}
      </li>`;
    });
    html += '</ul></div>';
  }

  document.getElementById('detail-body').innerHTML = html;
}

function gridRow(label, value) {
  return `<span class="label">${label}</span><span class="value">${value}</span>`;
}

function renderArtifactCard(a) {
  let html = `<div class="artifact-card">
    <span class="art-name">${escHtml(a.name)}</span>
    <span class="art-type">${escHtml(a.artifact_type)}${a.mime_type ? ' &middot; ' + escHtml(a.mime_type) : ''}</span>`;
  if (a.uri) {
    html += `<div class="art-uri"><a href="${escAttr(a.uri)}" target="_blank" rel="noopener">${escHtml(a.uri)}</a></div>`;
  }
  if (a.content) {
    const preview = a.content.length > 500 ? a.content.slice(0, 500) + '...' : a.content;
    html += `<div class="art-content">${escHtml(preview)}</div>`;
  }
  html += '</div>';
  return html;
}

// ── Workers tab ──────────────────────────────────────────────────────

function renderWorkers() {
  const container = document.getElementById('workers-content');
  // Derive worker info from jobs
  const workerMap = {};
  jobs.forEach(j => {
    const w = j.worker || '(unassigned)';
    if (!workerMap[w]) workerMap[w] = { name: w, total: 0, running: 0, succeeded: 0, failed: 0 };
    workerMap[w].total++;
    if (j.status === 'running') workerMap[w].running++;
    else if (j.status === 'succeeded') workerMap[w].succeeded++;
    else if (j.status === 'failed' || j.status === 'timed_out') workerMap[w].failed++;
  });

  const workers = Object.values(workerMap);
  if (workers.length === 0) {
    container.innerHTML = '<div class="empty"><div class="icon">&#9881;</div><p>No workers observed yet</p></div>';
    return;
  }

  container.innerHTML = workers.map(w => `
    <div class="worker-card">
      <div class="worker-name">${escHtml(w.name)}</div>
      <div class="worker-stats">
        <span>${w.total} jobs</span>
        <span style="color:var(--orange)">${w.running} running</span>
        <span style="color:var(--green)">${w.succeeded} succeeded</span>
        <span style="color:var(--red)">${w.failed} failed</span>
      </div>
    </div>
  `).join('');
}

// ── Artifacts tab ────────────────────────────────────────────────────

function renderAllArtifacts() {
  const container = document.getElementById('artifacts-content');
  const allArts = [];
  for (const [jobID, arts] of Object.entries(allArtifacts)) {
    arts.forEach(a => allArts.push({ ...a, _jobID: jobID }));
  }

  if (allArts.length === 0) {
    container.innerHTML = '<div class="empty"><div class="icon">&#128230;</div><p>No artifacts collected yet. Click on a job to load its artifacts.</p></div>';
    return;
  }

  // Sort by created_at desc
  allArts.sort((a, b) => (b.created_at || '').localeCompare(a.created_at || ''));

  container.innerHTML = allArts.map(a => {
    const shortJob = a._jobID.length > 16 ? a._jobID.slice(0, 16) + '...' : a._jobID;
    return `<div class="artifact-card" style="cursor:pointer" onclick="openDetail('${escAttr(a._jobID)}')">
      <span class="art-name">${escHtml(a.name)}</span>
      <span class="art-type">${escHtml(a.artifact_type)} &middot; <span class="mono">${escHtml(shortJob)}</span></span>
      ${a.uri ? '<div class="art-uri"><a href="' + escAttr(a.uri) + '" target="_blank" rel="noopener">' + escHtml(a.uri) + '</a></div>' : ''}
      ${a.content ? '<div class="art-content">' + escHtml(a.content.length > 300 ? a.content.slice(0, 300) + '...' : a.content) + '</div>' : ''}
    </div>`;
  }).join('');
}

// ── Queue tab ────────────────────────────────────────────────────────

function renderQueue() {
  const container = document.getElementById('queue-content');
  const pending = jobs.filter(j => j.status === 'pending');
  const running = jobs.filter(j => j.status === 'running');

  let html = '';

  html += '<div class="queue-section"><h3>Running (' + running.length + ')</h3>';
  if (running.length === 0) {
    html += '<p style="color:var(--fg2); font-size:13px;">No jobs currently running</p>';
  } else {
    html += '<table><thead><tr><th>Job ID</th><th>Kind</th><th>Worker</th><th>Description</th><th>Started</th></tr></thead><tbody>';
    running.forEach(j => {
      html += `<tr class="clickable" onclick="openDetail('${escAttr(j.job_id)}')">
        <td class="mono">${escHtml(j.job_id.length > 20 ? j.job_id.slice(0, 20) + '...' : j.job_id)}</td>
        <td>${escHtml(j.kind || '-')}</td>
        <td>${escHtml(j.worker || '-')}</td>
        <td>${escHtml(j.description || '-')}</td>
        <td>${formatTime(j.started_at)}</td>
      </tr>`;
    });
    html += '</tbody></table>';
  }
  html += '</div>';

  html += '<div class="queue-section"><h3>Pending (' + pending.length + ')</h3>';
  if (pending.length === 0) {
    html += '<p style="color:var(--fg2); font-size:13px;">Queue is empty</p>';
  } else {
    html += '<table><thead><tr><th>Job ID</th><th>Kind</th><th>Worker</th><th>Description</th><th>Created</th></tr></thead><tbody>';
    pending.forEach(j => {
      html += `<tr class="clickable" onclick="openDetail('${escAttr(j.job_id)}')">
        <td class="mono">${escHtml(j.job_id.length > 20 ? j.job_id.slice(0, 20) + '...' : j.job_id)}</td>
        <td>${escHtml(j.kind || '-')}</td>
        <td>${escHtml(j.worker || '-')}</td>
        <td>${escHtml(j.description || '-')}</td>
        <td>${formatTime(j.created_at)}</td>
      </tr>`;
    });
    html += '</tbody></table>';
  }
  html += '</div>';

  container.innerHTML = html;
}

// ── Helpers ──────────────────────────────────────────────────────────

function escHtml(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function escAttr(s) {
  if (!s) return '';
  return s.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// Auto-refresh every 10 seconds
setInterval(refreshData, 10000);

// Close detail panel with Escape
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeDetail();
});

// Start
connect();
</script>
</body>
</html>
